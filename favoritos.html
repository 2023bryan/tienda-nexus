<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Favoritos - SONIC BOX</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            color: #2c3e50;
            overflow-x: hidden;
            max-width: 100%;
        }
        html {
            overflow-x: hidden;
            max-width: 100%;
        }
        .section {
            padding: 3rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        .products {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.75rem;
        }
        .product {
            position: relative;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 14px 40px rgba(0,0,0,0.08);
            transition: transform 0.35s ease, box-shadow 0.35s ease;
            display: flex;
            flex-direction: column;
        }
        .product:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 48px rgba(0,0,0,0.14);
        }
        .product-image {
            height: 240px;
            width: 100%;
            overflow: hidden;
            position: relative;
            background: linear-gradient(180deg, #f4f6ff 0%, #ffffff 100%);
            cursor: pointer;
            display: flex;
            align-items: stretch;
            justify-content: center;
        }
        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
            transform-origin: center center;
        }
        .product-image a {
            display: block;
            width: 100%;
            height: 100%;
        }
        .product-image:hover img {
            transform: scale(1.08);
        }
        .product-info {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
            flex: 1;
        }
        .product-info h3 {
            color: #1b2753;
            font-size: 1.2rem;
            margin: 0;
        }
        .product-info h3 a {
            color: inherit;
            text-decoration: none;
            transition: color 0.3s;
        }
        .product-info h3 a:hover {
            color: #ff6f00;
        }
        .product-desc {
            font-size: 0.95rem;
            color: #5f6774;
            margin: 0;
            line-height: 1.6;
            min-height: 3.2rem;
        }
        .product-prices {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            margin: 0;
        }
        .price-normal {
            font-size: 0.9rem;
            color: #a6afc7;
            text-decoration: line-through;
        }
        .price-special {
            font-size: 1.45rem;
            color: #ff6f00;
            font-weight: 700;
        }
        .favorite-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(255,255,255,0.96);
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #a9a9a9;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .product:hover .favorite-btn {
            transform: translateY(-1px) scale(1.05);
        }
        .favorite-btn:hover {
            color: #ff6f00;
        }
        .favorite-btn.favorited {
            color: #ff6f00;
            background: #fff0f1;
        }
        .product-image a,
        .product-info h3 a {
            display: block;
            width: 100%;
        }
        .no-favorites {
            text-align: center;
            font-size: 1.2rem;
            color: #666;
            margin-top: 2rem;
        }
        @media (max-width: 1024px) and (min-width: 769px) {
            .section {
                padding: 2rem 1.5rem;
            }
            .products {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.5rem;
            }
            .product-image {
                height: 220px;
            }
        }
        @media (max-width: 768px) {
            .section {
                padding: 1.5rem 1rem;
            }
            .store-page-heading--footer-style {
                padding: 0.85rem 1rem;
            }
            .store-page-title {
                font-size: 1rem;
            }
            .store-page-title img {
                width: 24px;
                height: 24px;
            }
            .products {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }
            .product-image {
                height: 200px;
            }
            .product-info {
                padding: 1rem;
            }
            .product-info h3 {
                font-size: 1.1rem;
            }
            .product-desc {
                font-size: 0.9rem;
            }
            .price-special {
                font-size: 1.2rem;
            }
        }
        @media (max-width: 480px) {
            .section {
                padding: 1rem 0.5rem;
            }
            .store-page-heading--footer-style {
                padding: 0.75rem 0.85rem;
                margin-bottom: 1.25rem;
            }
            .store-page-title {
                font-size: 0.95rem;
            }
            .products {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.75rem;
            }
            .product {
                border-radius: 16px;
            }
            .product-image {
                height: 160px;
            }
            .product-info {
                padding: 0.75rem;
            }
            .product-info h3 {
                font-size: 1rem;
            }
            .product-desc {
                font-size: 0.85rem;
                min-height: 2.5rem;
            }
            .price-special {
                font-size: 1.1rem;
            }
            .price-normal {
                font-size: 0.8rem;
            }
        }
        @media (hover: none) and (pointer: coarse) {
            .product:hover {
                transform: none;
            }
            .product-image:hover img {
                transform: none;
            }
            .product:hover .favorite-btn {
                transform: none;
            }
        }
    </style>
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="chat.css">
    <link rel="stylesheet" href="footer.css">
</head>
<body>
    <!-- Header -->
    <div id="site-header"></div>

    <section class="section">
        <div class="store-page-heading store-page-heading--footer-style">
            <div class="store-page-title">
                <img src="images/Favoritos.png" alt="" aria-hidden="true">
                <h1>Mis Productos Favoritos</h1>
            </div>
        </div>
        <div class="products" id="favorites-list">
            <!-- Los productos favoritos se cargarán aquí -->
        </div>
        <div class="no-favorites" id="no-favorites" style="display: none;">
            No tienes productos en favoritos. ¡Agrega algunos desde la tienda!
        </div>
    </section>

    <!-- Footer -->
    <div id="site-footer"></div>



    <script>
        const products = [
            { id: 10, name: 'JBL PartyBox 520', price: 5200, normalPrice: 6200, desc: 'Altavoz potente con AI Sound Boost y luces dinámicas para tus fiestas.', image: 'images/JBL%20PartyBox%20520%2001.jpeg', link: 'productJBLPartyBox520.html' },
            { id: 11, name: 'JBL Tune 770NC', price: 1499, normalPrice: 1800, desc: 'Auriculares inalámbricos con cancelación de ruido adaptativa y 70 horas de batería.', image: 'images/JBL%20Tune%20770NC%2001.png', link: 'productJBLTune770NC.html' },
            { id: 12, name: 'JBL Tune 310C USB', price: 299, normalPrice: 399, desc: 'Auriculares intraaurales con conexión USB-C y sonido JBL Pure Bass.', image: 'images/JBL%20Tune%20310C%20USB%2001.png', link: 'productJBLTune310CUSB.html' },
            { id: 13, name: 'JBL PartyBox 710', price: 7200, normalPrice: 8500, desc: 'Experiencia de audio profesional con graves potentes y luces de fiesta envolventes.', image: 'images/JBL%20Partybox%20710%2001.jpeg', link: 'productJBLPartybox710.html' },
            { id: 14, name: 'JBL Tune 520BT', price: 499, normalPrice: 599, desc: 'Auriculares on-ear inalámbricos con 57 horas de batería y sonido JBL Pure Bass.', image: 'images/JBL%20Tune%20520BT%2001.png', link: 'productJBLTune520BT.html' },
            { id: 15, name: 'JBL Vibe Beam 2', price: 649, normalPrice: 799, desc: 'Auriculares true wireless con cancelación activa de ruido y 40 horas de batería.', image: 'images/JBL%20Vibe%20Beam%202%2001.png', link: 'productJBLVibeBeam2.html' },
            { id: 16, name: 'JBL Quantum 100M2', price: 329, normalPrice: 399, desc: 'Auriculares gaming con sonido inmersivo QuantumSOUND y micrófono vocal desmontable.', image: 'images/JBL%20Quantum%20100M2%2001.png', link: 'productJBLQuantum100M2.html' },
            { id: 17, name: 'JBL Clip 4', price: 610, normalPrice: 750, desc: 'Altavoz portátil impermeable con sonido nítido y 10 horas de batería.', image: 'images/JBL%20Clip%204%2001.jpeg', link: 'productJBLClip4.html' },
            { id: 18, name: 'JBL Xtreme 3', price: 2049, normalPrice: 2499, desc: 'Altavoz portátil con sonido envolvente, resistente al agua y 15 horas de batería.', image: 'images/JBL%20XTREME%203%20CON%20CORREA%2001.jpeg', link: 'productJBLXTREME3.html' },
            { id: 19, name: 'JBL Xtreme Ultra', price: 3549, normalPrice: 4299, desc: 'Altavoz premium con sonido JBL Pro, radiadores de graves y 24 horas de batería.', image: 'images/JBL%20XTREME%20ULTRA%2001.jpeg', link: 'productJBLXTREMEULTRA.html' },
            { id: 20, name: 'JBL GO 3', price: 262, normalPrice: 350, desc: 'Altavoz ultraportátil con sonido JBL Pro, resistente al agua y 7 horas de batería.', image: 'images/JBL%20GO%203%2001.jpeg', link: 'productJBLGO3.html' },
            { id: 21, name: 'JBL Clip 3', price: 649, normalPrice: 799, desc: 'Altavoz ultraportátil con mosquetón integrado, resistente al agua y 10 horas de batería.', image: 'images/JBL%20CLIP%203%2001.jpeg', link: 'productJBLClip3.html' }
        ];

        function loadFavorites() {
            const favorites = JSON.parse(localStorage.getItem('favorites')) || [];
            const favoritesList = document.getElementById('favorites-list');
            const noFavorites = document.getElementById('no-favorites');

            if (favorites.length === 0) {
                noFavorites.style.display = 'block';
                return;
            }

            noFavorites.style.display = 'none';

            favorites.forEach(favoriteItem => {
                const isObject = typeof favoriteItem === 'object' && favoriteItem !== null;
                const id = isObject ? favoriteItem.id : favoriteItem;
                const product = products.find(p => p.id === id) || {};
                const favorite = {
                    id,
                    name: isObject ? favoriteItem.name || product.name : product.name,
                    desc: isObject ? favoriteItem.desc || product.desc : product.desc,
                    price: Number(isObject ? favoriteItem.price : product.price) || product.price || 0,
                    normalPrice: Number(isObject ? favoriteItem.normalPrice : product.normalPrice) || product.normalPrice || 0,
                    image: isObject ? favoriteItem.image || product.image : product.image,
                    link: isObject ? favoriteItem.link || product.link : product.link,
                };

                if (favorite.name) {
                    const productDiv = document.createElement('div');
                    productDiv.className = 'product';
                    productDiv.innerHTML = `
                        <div class="product-image">
                            <a href="${favorite.link}"><img src="${favorite.image}" alt="${favorite.name}"></a>
                        </div>
                        <div class="product-info">
                            <h3><a href="${favorite.link}">${favorite.name}</a></h3>
                            <p class="product-desc">${favorite.desc}</p>
                            <div class="product-prices">
                                <div class="price-normal">Q${favorite.normalPrice.toLocaleString()}</div>
                                <div class="price-special">Q${favorite.price.toLocaleString()}</div>
                            </div>
                            <button class="favorite-btn favorited" id="fav-btn-${id}" onclick="toggleFavorite(${id}); location.reload();">♥</button>
                        </div>
                    `;
                    favoritesList.appendChild(productDiv);
                }
            });
        }

        function toggleFavorite(id) {
            // Use global function from header.js
        }

        document.addEventListener('DOMContentLoaded', loadFavorites);
    </script>
    <script src="chat.js"></script>
    <script src="auth.js"></script>
    <script src="header.js"></script>
    <script src="footer.js"></script>
</body>
</html>
