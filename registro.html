<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - SONIC BOX</title>
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="chat.css">
    <link rel="stylesheet" href="footer.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: #eceef3;
            color: #3d4459;
        }
        .register-page {
            padding: 140px 1.5rem 3rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .register-card {
            width: 100%;
            max-width: 440px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.07);
            padding: 2.25rem 2rem 2rem;
        }
        .register-logo {
            display: block;
            width: 88px;
            height: auto;
            margin: 0 auto 1.25rem;
        }
        .register-title {
            text-align: center;
            margin: 0 0 1.75rem;
            font-size: 1.65rem;
            font-weight: 700;
            color: #4a4f63;
            letter-spacing: -0.02em;
        }
        .field {
            margin-bottom: 0.85rem;
        }
        .field-inner {
            position: relative;
            background: #f3f4f8;
            border: 1px solid #e8eaf0;
            border-radius: 14px;
            padding: 0.55rem 3rem 0.55rem 1rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }
        .field-inner:focus-within {
            border-color: #e8974a;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(232, 151, 74, 0.15);
        }
        .field-label {
            display: block;
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: #8b90a3;
            text-transform: uppercase;
            margin-bottom: 0.2rem;
        }
        .field-input {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 0.95rem;
            color: #3d4459;
            outline: none;
            padding: 0;
            min-height: 1.35rem;
        }
        .field-input::placeholder {
            color: #b0b5c4;
        }
        .field-icon {
            position: absolute;
            right: 0.9rem;
            top: 50%;
            transform: translateY(-50%);
            width: 22px;
            height: 22px;
            color: #9aa0b3;
            pointer-events: none;
        }
        .field-icon svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        .toggle-password {
            pointer-events: auto;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: inherit;
        }
        .toggle-password:hover {
            color: #6b7188;
        }
        .captcha-box {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 1.25rem 0 1.5rem;
            padding: 0.85rem 1rem;
            background: #fafbfc;
            border: 1px solid #e3e6ef;
            border-radius: 4px;
            max-width: 304px;
        }
        .captcha-box input[type="checkbox"] {
            width: 26px;
            height: 26px;
            margin: 0;
            cursor: pointer;
            accent-color: #4a90d9;
        }
        .captcha-label {
            flex: 1;
            font-size: 0.95rem;
            color: #2c2c2c;
            cursor: pointer;
            user-select: none;
        }
        .captcha-brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            font-size: 0.55rem;
            color: #9aa0b3;
            line-height: 1.2;
        }
        .captcha-brand svg {
            width: 28px;
            height: 28px;
        }
        .submit-button {
            width: 100%;
            border: none;
            border-radius: 14px;
            padding: 1rem;
            font-size: 1.05rem;
            font-weight: 700;
            color: #ffffff;
            background: #e8974a;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            box-shadow: 0 10px 24px rgba(232, 151, 74, 0.28);
        }
        .submit-button:hover {
            background: #df8a38;
            transform: translateY(-1px);
        }
        .login-link {
            display: block;
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.9rem;
            color: #7a7f92;
            text-decoration: none;
        }
        .login-link:hover {
            color: #e8974a;
        }
        .field-error {
            font-size: 0.78rem;
            color: #d84315;
            margin-top: 0.35rem;
            display: none;
        }
        .field.has-error .field-inner {
            border-color: #ef9a9a;
            background: #fff8f8;
        }
        .field.has-error .field-error {
            display: block;
        }
        @media (max-width: 640px) {
            .register-page {
                padding-top: 120px;
            }
            .register-card {
                padding: 1.75rem 1.25rem;
                border-radius: 18px;
            }
        }
    </style>
</head>
<body>
    <div id="site-header"></div>
    <main class="register-page">
        <section class="register-card">
            <img class="register-logo" src="images/logo.png" alt="SONIC BOX" width="88" height="88">
            <h1 class="register-title">Crear Cuenta</h1>
            <form id="registerForm" novalidate>
                <div class="field" data-field="email">
                    <div class="field-inner">
                        <label class="field-label" for="email">Correo Electrónico (Usuario)</label>
                        <input class="field-input" id="email" name="email" type="email" placeholder="usuario@example.com" autocomplete="email" required>
                        <span class="field-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
                        </span>
                    </div>
                    <p class="field-error">Ingresa un correo válido</p>
                </div>
                <div class="field" data-field="nombres">
                    <div class="field-inner">
                        <label class="field-label" for="nombres">Nombres</label>
                        <input class="field-input" id="nombres" name="nombres" type="text" placeholder="Juan" autocomplete="given-name" required>
                        <span class="field-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M5 20c0-4 3.5-6 7-6s7 2 7 6"/></svg>
                        </span>
                    </div>
                    <p class="field-error">Ingresa tus nombres</p>
                </div>
                <div class="field" data-field="apellidos">
                    <div class="field-inner">
                        <label class="field-label" for="apellidos">Apellidos</label>
                        <input class="field-input" id="apellidos" name="apellidos" type="text" placeholder="Perez" autocomplete="family-name" required>
                        <span class="field-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="7" r="3.5"/><path d="M4 19c1.5-3.5 4.5-5 8-5s6.5 1.5 8 5"/></svg>
                        </span>
                    </div>
                    <p class="field-error">Ingresa tus apellidos</p>
                </div>
                <div class="field" data-field="telefono">
                    <div class="field-inner">
                        <label class="field-label" for="telefono">Telefono</label>
                        <input class="field-input" id="telefono" name="telefono" type="tel" placeholder="88888888" autocomplete="tel" required>
                        <span class="field-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 4h4l2 5-2 1a11 11 0 005 5l1-2 5 2v4c0 1-1 2-2 2C10 21 3 14 3 5c0-1 1-2 2-2z"/></svg>
                        </span>
                    </div>
                    <p class="field-error">Ingresa un teléfono válido</p>
                </div>
                <div class="field" data-field="password">
                    <div class="field-inner">
                        <label class="field-label" for="password">Contraseña</label>
                        <input class="field-input" id="password" name="password" type="password" autocomplete="new-password" required minlength="6">
                        <span class="field-icon">
                            <button type="button" class="toggle-password" data-target="password" aria-label="Mostrar contraseña">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12s4-7 9-7 9 7 9 7-4 7-9 7-9-7-9-7z"/><circle cx="12" cy="12" r="3"/><line x1="4" y1="4" x2="20" y2="20"/></svg>
                            </button>
                        </span>
                    </div>
                    <p class="field-error">Mínimo 6 caracteres</p>
                </div>
                <div class="field" data-field="passwordConfirm">
                    <div class="field-inner">
                        <label class="field-label" for="passwordConfirm">Confirmación de Contraseña</label>
                        <input class="field-input" id="passwordConfirm" name="passwordConfirm" type="password" autocomplete="new-password" required>
                        <span class="field-icon">
                            <button type="button" class="toggle-password" data-target="passwordConfirm" aria-label="Mostrar confirmación">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12s4-7 9-7 9 7 9 7-4 7-9 7-9-7-9-7z"/><circle cx="12" cy="12" r="3"/><line x1="4" y1="4" x2="20" y2="20"/></svg>
                            </button>
                        </span>
                    </div>
                    <p class="field-error">Las contraseñas no coinciden</p>
                </div>
                <div class="captcha-box">
                    <input type="checkbox" id="captchaCheck" name="captcha">
                    <label class="captcha-label" for="captchaCheck">No soy un robot</label>
                    <div class="captcha-brand" aria-hidden="true">
                        <svg viewBox="0 0 32 32"><path fill="#1c3aa9" d="M16 3a5 5 0 00-4.2 7.8L5 14l6.8 3.2A5 5 0 1016 3z"/><path fill="#4285f4" d="M16 29a5 5 0 004.2-7.8L27 18l-6.8-3.2A5 5 0 1016 29z"/><path fill="#ababab" d="M29 16a5 5 0 00-7.8-4.2L18 5l-3.2 6.8A5 5 0 1029 16z"/><path fill="#9b9b9b" d="M3 16a5 5 0 007.8 4.2L14 27l3.2-6.8A5 5 0 103 16z"/></svg>
                        <span>reCAPTCHA</span>
                        <span>Privacidad · Términos</span>
                    </div>
                </div>
                <button class="submit-button" type="submit">Registrarme</button>
            </form>
            <a class="login-link" href="login.html">¿Ya tienes cuenta? Inicia sesión</a>
        </section>
    </main>
    <div id="site-footer"></div>
    <script src="auth.js"></script>
    <script src="header.js"></script>
    <script src="footer.js"></script>
    <script src="chat.js"></script>
</body>
</html>
