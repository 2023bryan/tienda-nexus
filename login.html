<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cuenta - Tienda Nexus</title>
    <link rel="stylesheet" href="header.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: #f0f2f7;
            color: #2c3e50;
        }
        .login-page {
            padding: 140px 1.5rem 3rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 28px 80px rgba(0,0,0,0.08);
            padding: 2rem;
            position: relative;
        }
        .login-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            background: linear-gradient(135deg, rgba(255,152,0,0.12), rgba(255,87,34,0.08));
            z-index: 0;
        }
        .login-card > * {
            position: relative;
            z-index: 1;
        }
        .login-logo {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #ff5722;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2rem;
            font-weight: 700;
        }
        .login-title {
            text-align: center;
            margin: 0 0 1.5rem;
            font-size: 1.9rem;
            color: #1a237e;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-label {
            display: block;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            color: #7a7f92;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }
        .form-control {
            width: 100%;
            box-sizing: border-box;
            padding: 1rem 1rem;
            min-height: 52px;
            border: 1px solid #e3e6ef;
            border-radius: 16px;
            background: #f7f8fb;
            font-size: 0.95rem;
            color: #2c3e50;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .form-control:focus {
            border-color: #ff8f00;
            box-shadow: 0 0 0 4px rgba(255,143,0,0.12);
            background: #ffffff;
        }
        .action-button,
        .secondary-button,
        .social-button {
            width: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            border: none;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .action-button {
            background: #ff6f00;
            color: white;
            box-shadow: 0 12px 24px rgba(255,111,0,0.22);
            margin-top: 1rem;
        }
        .action-button:hover {
            transform: translateY(-2px);
        }
        .secondary-button {
            background: transparent;
            color: #555a72;
            border: 1px solid #d3d5e0;
            margin-top: 1rem;
        }
        .secondary-button:hover {
            background: #f7f8fb;
        }
        .text-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: #7a7f92;
            text-decoration: none;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 2rem 0 1.5rem;
            font-size: 0.9rem;
            color: #9aa0b8;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e3e6ef;
        }
        .social-button {
            border: 1px solid #e3e6ef;
            background: white;
            color: #2c3e50;
            gap: 0.75rem;
            margin-top: 0.85rem;
        }
        .social-button.google {
            color: #202124;
        }
        .social-button.facebook {
            color: #1877f2;
        }
        .social-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        .social-icon {
            display: inline-flex;
            width: 24px;
            height: 24px;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.05);
            border-radius: 8px;
        }
        @media (max-width: 640px) {
            .login-page {
                padding-top: 120px;
            }
            .login-card {
                border-radius: 20px;
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div id="site-header"></div>
    <main class="login-page">
        <section class="login-card">
            <div class="login-logo">N</div>
            <h1 class="login-title">Inicio de Sesión</h1>
            <div class="form-group">
                <label class="form-label" for="email">Correo Electrónico</label>
                <input class="form-control" id="email" type="email" placeholder="ejemplo@correo.com">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Contraseña</label>
                <input class="form-control" id="password" type="password" placeholder="Escribe tu contraseña">
            </div>
            <button class="action-button" type="button" id="loginBtn">Ingresar</button>
            <button class="secondary-button" type="button" id="registerBtn">Registrarme</button>
            <a class="text-link" href="#">¿Olvidaste la contraseña?</a>
            <div class="divider">O</div>
            <button class="social-button google" type="button">
                <span class="social-icon">G</span>
                Iniciar con Google
            </button>
            <button class="social-button facebook" type="button">
                <span class="social-icon">f</span>
                Iniciar con Facebook
            </button>
        </section>
    </main>
    <script src="header.js" defer></script>
    <script>
        // Sistema de autenticación
        const AUTH_KEY = 'auth_user';
        
        function getStoredUsers() {
            return JSON.parse(localStorage.getItem('users')) || [];
        }
        
        function saveUser(email, password, name) {
            const users = getStoredUsers();
            if (users.find(u => u.email === email)) {
                return { success: false, message: 'El correo ya está registrado' };
            }
            users.push({ email, password, name, createdAt: new Date().toISOString() });
            localStorage.setItem('users', JSON.stringify(users));
            return { success: true, message: 'Usuario registrado correctamente' };
        }
        
        function authenticateUser(email, password) {
            const users = getStoredUsers();
            const user = users.find(u => u.email === email && u.password === password);
            if (user) {
                localStorage.setItem(AUTH_KEY, JSON.stringify(user));
                return { success: true, user };
            }
            return { success: false, message: 'Correo o contraseña incorrectos' };
        }
        
        function getCurrentUser() {
            return JSON.parse(localStorage.getItem(AUTH_KEY));
        }
        
        function logout() {
            localStorage.removeItem(AUTH_KEY);
            window.location.href = 'index.html';
        }
        
        // Event listeners
        document.getElementById('loginBtn').addEventListener('click', function() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                alert('Por favor completa todos los campos');
                return;
            }
            
            const result = authenticateUser(email, password);
            if (result.success) {
                alert('¡Bienvenido, ' + result.user.name + '!');
                window.location.href = 'index.html';
            } else {
                alert(result.message);
            }
        });
        
        document.getElementById('registerBtn').addEventListener('click', function() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const name = prompt('¿Cuál es tu nombre?');
            
            if (!email || !password) {
                alert('Por favor completa todos los campos');
                return;
            }
            
            if (!name) {
                alert('Por favor ingresa tu nombre');
                return;
            }
            
            const result = saveUser(email, password, name);
            if (result.success) {
                alert(result.message + '. Ahora puedes iniciar sesión.');
            } else {
                alert(result.message);
            }
        });
        
        // Verificar si ya hay sesión activa
        if (getCurrentUser()) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
